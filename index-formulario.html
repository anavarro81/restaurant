<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante "El socarrat"</title>
  <link rel="shortcut icon" href="./img/paella.png" type="image/x-icon" />
  <link rel="stylesheet" href="estilo-formulario.css"> 
  <link rel="stylesheet" href="home.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet" />
  <script src="script-formulario.js" defer></script>
</head>

<body class="body-formulario">
  <header>
    <div class="title">
      <img class="logo" src="img/paella_logo.png" alt="logo">
      <div class="name">
        <h1>RESTAURANTE EL SOCARRAT</h1>
        <h2>VERDADERO CRUJIENTE VALENCIANO</h2>
      </div>
    </div>
    <nav class="nav">
      <ul class="menu">
        <li id="red"><a href="/">Hogar</a></li>
        <li><a href="login.html">Iniciar Sesión</a></li>
        <li><a href="index-formulario.html">Reserva</a></li>
        <li><a href="carta.html">Menú</a></li>
      </ul>
      <ul class="languages">
        <li><img src="assets/images/es.svg" alt="Español" height="30px"></li>
        <li><a href="home_en.html"><img src="assets/images/en-us.svg" alt="English" height="30px"></a></li>
      </ul>
    </nav>
  </header>




<div class="formulario"> 
  <h2 class="h2formulario">Haz tu reserva</h2>
  <form action="./confirmation.html">
    <div class="caja1">
      <section class="section-formulario">
        <div class="caja2">
          <label for="nombredelusuario">Nombre:</label>
          <br />
          <br />
          <input type="text" id="nombredelusuario" name="usuario" placeholder="Nombre" required />
        </div>

        <div class="caja2">
          <label for="apellidodelusuario">Apellido:</label>
          <br />
          <br />
          <input type="text" id="apellidodelusuario" name="apellido" placeholder="Apellido" required />
        </div>

        <div class="caja2">
          <label for="emaildelusuario">Email:</label>
          <br />
          <br />
          <input type="email" id="emaildelusuario" name="email" placeholder="@gmail.com" required />
        </div>

        <div class="caja2">
          <label for="telef">Teléfono:</label>
          <br />
          <br />
          <input type="tel" id="telef" placeholder="612 345 678" name="tel" required />
        </div>

        <div class="caja2">
          <label for="personas">Cantidad de personas:</label>
          <br />
          <br />
          <input type="number" id="personas" name="personas" min="1" max="10" value="1" required />
        </div>

        <div class="caja2">
          <p>Selecciona tu preferencia:</p>
          <input type="radio" id="afuera" name="ubicacion" value="afuera" />
          <label for="afuera">Afuera</label>

          <input type="radio" id="adentro" name="ubicacion" value="adentro" />
          <label for="adentro">Adentro</label>
        </div>

        <div class="caja2">
          <label for="fecha">Fecha para la reserva:</label>
          <br />
          <br />
          <input type="date" id="fecha" name="fecha" value="2026-03-25" required />
        </div>

        <div class="caja2">
          <label for="hora">Selecciona una hora:</label>
          <br />
          <br />
          <input type="time" id="hora" name="hora" required />
        </div>
        <br />
        <div class="caja2">
          <label for="mensaje">Sugerencia:</label>
          <br />
          <br />
          <textarea name="mensaje" id="mensaje"></textarea>
        </div>
        <br />

        <button class="button-formulario" type="submit">Enviar Reserva</button>
      </section>
    </div>
  </form>
  </div>
</body>

</html>
