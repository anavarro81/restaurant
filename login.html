<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurante "El socarrat"</title>
    <link rel="stylesheet" href="./login.css" />
    <link rel="shortcut icon" href="./img/paella.png" type="image/x-icon" />
  </head>
  <body>
    <div class="main-container">
      <div class="card-container">
        <h2 class="">Iniciar Sesión</h2>
        <form class="form-container" action="./booking.html">
          <div>
            <label for="email" class=""> Correo Electrónico </label>
            <input
              type="email"
              id="email"
              name="email"
              required
              class="input-form"
              placeholder="correo@prueba.com"
              autocomplete="email"
            />
          </div>
          <div>
            <label for="password" class=""> Contraseña </label>
            <div class="">
              <input
                type="password"
                id="password"
                name="password"
                required
                class="input-form"
                placeholder="********"
                autocomplete="current-password"
              />
            </div>
            <p class="error-msg" id="error-msg"></p>
          </div>
          <div>
            <button type="button" class="" onclick="login()">
              Iniciar Sesión
            </button>
          </div>
        </form>
        <div class="link-register-container">
          <a href="#" class="link-register">
            ¿No tienes una cuenta? Regístrate
          </a>
          <a href="./assets/cartaSocarrat.pdf" download="Carta Socarrat">
            Descargar carta
          </a>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
