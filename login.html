<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurante "El socarrat"</title>
    <link rel="stylesheet" href="./login.css" />
    <link rel="shortcut icon" href="./img/paella.png" type="image/x-icon" />
  </head>
  <body>
    <div class="main-container">
      <div class="card-container">
        <h2 class="">Iniciar Sesión</h2>
        <form class="space-y-4">
          <div>
            <label for="email" class=""> Correo Electrónico </label>
            <input
              type="email"
              id="email"
              name="email"
              required
              class=""
              placeholder="tu@ejemplo.com"
              autocomplete="email"
            />
          </div>
          <div>
            <label
              for="password"
              class="block text-sm font-medium text-gray-700"
            >
              Contraseña
            </label>
            <div class="mt-1 relative rounded-md shadow-sm">
              <input
                type="password"
                id="password"
                name="password"
                required
                class="input-password"
                placeholder="********"
                autocomplete="current-password"
              />
            </div>
          </div>
          <div>
            <button type="submit" class="">Iniciar Sesión</button>
          </div>
        </form>
        <div class="link-register-container">
          <a href="3" class="link-register">
            ¿No tienes una cuenta? Regístrate
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
